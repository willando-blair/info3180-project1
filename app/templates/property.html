{% extends "base.html" %}

{% block main %}
<div class="container">
    <div class="property-detail">
        <img src="{{ url_for('static', filename='uploads/' + property.photo_filename) }}" alt="{{ property.title }}">

        <h1>{{ property.title }}</h1>

        <div class="detail-section">
            <p><strong>Description:</strong> {{ property.description }}</p>
            <p><strong>Bedrooms:</strong> {{ property.rooms }}</p>
            <p><strong>Bathrooms:</strong> {{ property.bathrooms }}</p>
            <p><strong>Price:</strong> ${{ property.price }}</p>
            <p><strong>Location:</strong> {{ property.location }}</p>
            <p><strong>Type:</strong> {{ property.type }}</p>
        </div>

        <button class="btn btn-primary">Email Realtor</button>
        <a href="{{ url_for('properties') }}" class="btn">Back to List</a>
    </div>
</div>
{% endblock %}
